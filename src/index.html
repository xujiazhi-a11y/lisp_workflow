<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css" />
    <!-- 下面一句CDN引入yu组件库 -->
    <link rel="stylesheet" href="https://unpkg.com/yu.css.ui/dist/index.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" 
                integrity="sha384-WskhaSGFgHYWDcbwN70/dfYBj47jz9qbsMId/iRN3ewGhXQFZCSftd1LZCfmhktB" crossorigin="anonymous">
  </head>
  <body>
    <!-- <h3 id="file-path"></h3> -->
    <div class="main-container">
      <div class="yu-input textarea">
        <textarea cols="60" rows="27" id="textarea"></textarea>
      </div>
      <div class="drag-file-container">
        <div class="jumbotron">
          <p class="alert alert-info" id="drag-file">拖动文件至此处，以获取文件绝对路径</p>
        </div>
        <input type="text" placeholder="文件绝对路径显示："/>
        <textarea class="instruction">说明</textarea>
      </div>
    </div>
    <div class="console-log-container">
      <fieldset id="console-log-div"></fieldset>
    </div>
    <!-- <p>The fieldset above will mirror <code>console.log</code> calls</p> -->
    <script src="..\console-log-div\console-log-div.js"></script>
    <input id="btn" type="button" value="运行"></input>
    </br>
    <!-- 保存成功提示 -->
    <div class="yu-notification top-right" >
      <div id="saveNotice" class="notice">
        <i class="iconfont icon-check-circle"></i>
        <i id="closeSaveNotice" class="iconfont icon-close"></i>
        <div class="content">
          <div class="message">
            保存
          </div>
          <div class="description">
            成功
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="index.js"></script>
</html>
